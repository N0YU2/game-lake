    <style>
       :root { 
    /* Primary Colors */
    --blue: #2c3e50; 
    --orange: #a04000; 
    --bg: #0f1419; 
    --frame: #1a1f2e;
    --card-bg: #f8f9fa;
    --accent: #ff6b6b;
    
    /* Gradient Colors */
    --grad1: #6366f1;
    --grad2: #8b5cf6;
    --grad3: #ec4899;
    --grad4: #f43f5e;
    --grad5: #fbbf24;
    --grad6: #34d399;
    
    /* Popup Colors */
    --pop1: #ff6b9d;
    --pop2: #c44569;
    --pop3: #f8b500;
    --pop4: #30b0c0;
    --pop5: #a8edea;
    --pop6: #fed6e3;
    --pop7: #74b9ff;
    --pop8: #81ecec;
    
    /* Neutrals */
    --text: #2d3748;
    --text-light: #718096;
    --border: #e2e8f0;
    --shadow1: rgba(0,0,0,0.1);
    --shadow2: rgba(0,0,0,0.15);
    --shadow3: rgba(0,0,0,0.2);
}

body { 
    background: linear-gradient(135deg, var(--bg) 0%, #1a2f4e 100%); 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Noto Sans JP", sans-serif; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    color: var(--text);
    min-height: 100vh;
}

#console-frame { 
    background: linear-gradient(135deg, var(--frame) 0%, #232f3e 100%);
    width: 95%; 
    max-width: 600px; 
    min-height: 95vh; 
    margin: 10px; 
    border-radius: 20px; 
    border: 3px solid rgba(255,255,255,0.1); 
    padding: 25px; 
    box-sizing: border-box; 
    color: white; 
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
}

#console-frame::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 20% 50%, rgba(99,102,241,0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 50%);
    pointer-events: none;
}

#console-frame::before { 
    content: ""; 
    position: absolute; 
    top: 8px; 
    left: 8px; 
    right: 8px; 
    bottom: 8px; 
    border: 1px solid rgba(255,255,255,0.08); 
    border-radius: 15px; 
    pointer-events: none; 
}

.screen { 
    background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
    border-radius: 15px; 
    color: var(--text);
    padding: 20px; 
    min-height: 520px; 
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.1);
    overflow-y: auto; 
    position: relative;
}

.hidden { display: none !important; }

.btn { 
    padding: 14px 20px; 
    border-radius: 10px; 
    font-weight: 600; 
    cursor: pointer; 
    border: none; 
    width: 100%; 
    margin: 10px 0; 
    font-size: 1rem; 
    transition: all 0.3s ease;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.15) !important;
}

.btn:active { 
    transform: translateY(-1px);
}

/* Button Variants */
.btn-blue { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; 
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}

.btn-blue:hover {
    box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5) !important;
}

.btn-orange { 
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white; 
    box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3);
}

.btn-orange:hover {
    box-shadow: 0 12px 30px rgba(245, 87, 108, 0.5) !important;
}

.btn-gray { 
    background: linear-gradient(135deg, #e0e7ff 0%, #f0f4f8 100%);
    color: #667eea; 
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    font-weight: 700;
}

.btn-gray:hover {
    background: linear-gradient(135deg, #c7d2fe 0%, #e0e7ff 100%);
}

.btn-success {
    background: linear-gradient(135deg, #34d399 0%, #059669 100%);
    color: white;
    box-shadow: 0 8px 20px rgba(52, 211, 153, 0.3);
}

.btn-success:hover {
    box-shadow: 0 12px 30px rgba(52, 211, 153, 0.5) !important;
}


/* KillerDance カードスタイル - 暗い神秘的な探偵テーマ */
/* KillerDance カードスタイル - 原作準拠のクラシック探偵テーマ */
.kd-card { 
    border: 3px solid #8b4513; 
    border-radius: 8px; 
    padding: 18px; 
    margin: 12px 0; 
    background: linear-gradient(135deg, #2f1b14 0%, #1a0f0a 50%, #2f1b14 100%);
    color: #f4e4bc;
    box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4), inset 0 2px 0 rgba(244, 228, 188, 0.1);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    font-family: 'Times New Roman', serif;
    border-image: linear-gradient(45deg, #8b4513, #daa520, #8b4513) 1;
}

.kd-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(139, 69, 19, 0.6), inset 0 2px 0 rgba(244, 228, 188, 0.2);
    border-color: #daa520;
}

.kd-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(218, 165, 32, 0.1), transparent);
    transition: left 0.6s;
}

.kd-card:hover::before { left: 100%; }

.kd-card::after { 
    content: "🔍"; 
    position: absolute; 
    top: -10px; 
    right: -10px; 
    font-size: 2rem; 
    opacity: 0.3; 
    transform: rotate(15deg); 
}

.kd-card button { 
    margin-top: 12px; 
    border-radius: 6px;
    background: linear-gradient(135deg, #8b4513 0%, #daa520 100%);
    border: 2px solid #daa520;
    color: #2f1b14;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(139, 69, 19, 0.5);
    font-family: 'Times New Roman', serif;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.kd-card button:hover {
    background: linear-gradient(135deg, #daa520 0%, #ffd700 100%);
    box-shadow: 0 6px 16px rgba(218, 165, 32, 0.7);
    border-color: #ffd700;
}

.kd-pill { 
    display: inline-block; 
    padding: 6px 14px; 
    border-radius: 15px; 
    font-size: 0.75rem; 
    font-weight: 600;
    background: linear-gradient(135deg, #8b4513 0%, #daa520 100%);
    color: #2f1b14; 
    margin: 3px; 
    box-shadow: 0 4px 12px rgba(139, 69, 19, 0.4);
    transition: all 0.2s ease;
    font-family: 'Times New Roman', serif;
    border: 1px solid #daa520;
}

.kd-pill:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 16px rgba(218, 165, 32, 0.6);
    background: linear-gradient(135deg, #daa520 0%, #ffd700 100%);
}

.kd-panel { 
    border: 3px solid #8b4513; 
    border-radius: 10px; 
    padding: 16px; 
    background: linear-gradient(135deg, #1a0f0a 0%, #2f1b14 100%);
    margin: 15px 0; 
    box-shadow: 0 6px 20px rgba(139, 69, 19, 0.3), inset 0 2px 0 rgba(244, 228, 188, 0.05);
    color: #f4e4bc;
    border-image: linear-gradient(45deg, #8b4513, #daa520, #8b4513) 1;
}

.kd-danger { 
    color: #ff6b35; 
    font-weight: bold; 
    border: 2px solid #ff6b35; 
    padding: 8px 12px;
    display: block; 
    text-align: center; 
    background: linear-gradient(135deg, #330000 0%, #1a0000 100%);
    border-radius: 6px;
    margin: 8px 0;
    box-shadow: 0 2px 8px rgba(255, 107, 53, 0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.kd-log { 
    font-size: 0.75rem; 
    background: linear-gradient(135deg, #1a0f0a 0%, #2f1b14 100%);
    border: 2px solid #8b4513; 
    padding: 12px;
    border-radius: 6px;
    color: #f4e4bc;
    font-family: 'Courier New', monospace;
}

/* ゲームカード */
.game-card { 
    border: none; 
    border-radius: 15px; 
    padding: 24px; 
    margin: 16px 0; 
    background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
    color: var(--text];
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.game-card::after {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
    transform: rotate(45deg);
    transition: all 0.6s;
}

.game-card:hover { 
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    border: 2px solid #667eea;
    border-radius: 15px;
}

.game-card:hover::after {
    left: 100%;
}

.game-card h3 { 
    margin: 0 0 12px 0; 
    color: #667eea;
    font-size: 1.3rem;
    font-weight: 700;
}

.game-card p { 
    margin: 8px 0; 
    font-size: 0.9rem; 
    color: var(--text-light);
    line-height: 1.5;
}

.game-card .btn { 
    margin: 14px 0 0 0;
}

/* スコアボード */
.scoreboard { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ec4899 100%);
    border-radius: 15px; 
    padding: 20px; 
    margin: 16px 0; 
    color: white; 
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    position: relative;
    overflow: hidden;
}

.scoreboard::before {
    content: "";
    position: absolute;
    top: -50%;
    right: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 50px 50px;
}

.scoreboard h3 { 
    margin: 0 0 16px 0; 
    text-align: center;
    font-size: 1.4rem;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.score-entry { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 12px; 
    background: rgba(255,255,255,0.15); 
    border-radius: 10px; 
    margin: 8px 0;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
}

.score-entry:hover {
    background: rgba(255,255,255,0.25);
    transform: translateX(4px);
}

.score-rank { 
    font-weight: bold; 
    font-size: 1.3rem; 
    color: #fbbf24; 
    min-width: 40px; 
}

.score-name { 
    flex: 1; 
    margin-left: 12px;
    font-weight: 600;
}

.score-value { 
    background: rgba(255,255,255,0.2); 
    padding: 6px 16px; 
    border-radius: 20px; 
    font-weight: bold;
    font-size: 0.85rem;
}

.stats-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px; 
    margin: 14px 0; 
}

.stat-box { 
    background: rgba(255,255,255,0.12); 
    padding: 12px; 
    border-radius: 10px; 
    text-align: center;
    backdrop-filter: blur(10px);
}

.stat-label { 
    font-size: 0.75rem; 
    opacity: 0.85;
    font-weight: 600;
}

.stat-value { 
    font-size: 1.6rem; 
    font-weight: bold; 
    margin-top: 6px; 
}

.btn-scoreboard { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; 
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}

.btn-scoreboard:hover { 
    box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5) !important;
}

/* アニメーション */
@keyframes fadeIn { 
    from { 
        opacity: 0; 
        transform: translateY(15px); 
    } 
    to { 
        opacity: 1; 
        transform: translateY(0); 
    } 
}

@keyframes slideIn { 
    from { 
        opacity: 0; 
        transform: translateX(-25px); 
    } 
    to { 
        opacity: 1; 
        transform: translateX(0); 
    } 
}

@keyframes slideInRight {
    from {
        opacity: 0;
        transform: translateX(25px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes pulse { 
    0%, 100% { 
        transform: scale(1); 
    } 
    50% { 
        transform: scale(1.08); 
    } 
}

@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-10px);
    }
}

@keyframes glow {
    0%, 100% {
        box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
    }
    50% {
        box-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
    }
}

@keyframes celebrate { 
    0% { 
        transform: scale(0) rotate(0deg); 
        opacity: 0; 
    } 
    50% { 
        opacity: 1; 
    } 
    100% { 
        transform: scale(1) rotate(360deg); 
        opacity: 0; 
    } 
}

.btn { animation: fadeIn 0.3s ease-out; }
.kd-card { animation: slideIn 0.4s ease-out; }
.game-card { animation: slideInRight 0.5s ease-out; }

.btn:hover { 
    animation: pulse 0.4s ease-in-out; 
}

.btn.loading {
    animation: glow 1s ease-in-out infinite;
}

.win-banner { 
    animation: celebrate 2s ease-out forwards; 
    font-size: 5rem; 
    position: fixed; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%, -50%); 
    z-index: 9999; 
    pointer-events: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}

/* 勝利画面 */
.victory-screen {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ec4899 100%);
    border-radius: 18px;
    padding: 36px 24px;
    margin: 24px 0;
    color: white;
    text-align: center;
    box-shadow: 0 16px 40px rgba(102, 126, 234, 0.4);

.victory-screen::before {
    content: "";
    position: absolute;
    top: -50%;

    height: 200%;

}

.victory-screen h2 { 
    margin: 0 0 18px 0; 
    font-size: 2.2rem;
    text-shadow: 0 3px 6px rgba(0,0,0,0.3);

.victory-screen .winners { 
    font-size: 1.4rem;

/* リセットリンク */
.reset-link { 
    opacity: 0.5; 
    transition: all 0.3s ease;
    cursor: pointer;
    color: #888;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
}

.reset-link:hover { 
    opacity: 1;
    color: #667eea;
}

/* 既存ゲーム用カード - 本物のカードのようなデザイン */
.ito-card {
    width: 75px;
    height: 105px;

const firebaseConfig = { databaseURL: "https://noyu-d5611-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const Core = {
    user: "", currentGame: null, testPlayers: [], currentTestPlayer: null,
    login() {
        this.user = document.getElementById('in-name').value.trim();
        if(!this.user) return;
        document.getElementById('u-display').innerText = "👤 " + this.user;
        this.show('view-portal');
    },
    switchTestPlayer(playerId) {
        if(this.user === "n0yu") {
            this.currentTestPlayer = playerId;
            // UI更新
            document.getElementById('u-display').innerText = "👤 " + playerId;
            // ゲーム再読み込み
            if(this.currentGame) {
                this.currentGame.init();
            }
        }
    },
    show(id) {
        ['view-login', 'view-portal', 'view-game', 'view-scoreboard'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },
    showScoreboard() {
        this.show('view-scoreboard');
        this.loadScoreboard();
    },
    loadScoreboard() {
        db.ref('stats').once('value', snap => {
            const stats = snap.val() || {};
            let html = '';
            
            // ゲーム別スコアボード
            const gameNames = { ito: 'Ito', de: 'Decrypto', kd: '犯人は踊る' };
            Object.keys(gameNames).forEach(gameId => {
                const gameStats = stats[gameId] || {};
                const players = Object.entries(gameStats).map(([name, data]) => ({
                    name, wins: data.wins || 0, plays: data.plays || 0, winRate: (data.plays > 0 ? ((data.wins/data.plays)*100).toFixed(1) : 0)
                })).sort((a, b) => b.wins - a.wins);
                
                html += `<div class="scoreboard">
                    <h3>${gameNames[gameId]}</h3>
                    <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr); font-size: 0.8rem;">
                        <div class="stat-box"><div class="stat-label">total players</div><div class="stat-value">${players.length}</div></div>
                        <div class="stat-box"><div class="stat-label">total games</div><div class="stat-value">${players.reduce((sum, p) => sum + p.plays, 0)}</div></div>
                    </div>
                    ${players.slice(0, 5).map((p, i) => `<div class="score-entry">
                        <span class="score-rank">#${i+1}</span>
                        <span class="score-name">${p.name}</span>
                        <span class="score-value">${p.wins}W / ${p.plays}P (${p.winRate}%)</span>
                    </div>`).join('')}
                </div>`;
            });
            
            document.getElementById('scoreboard-content').innerHTML = html || '<p style="color:#ddd;">まだゲーム記録がありません</p>';
        });
    },
    loadGame(gid) {
        this.currentGame = gid;
        document.getElementById('game-tag').innerText = gid.toUpperCase();
        this.show('view-game');
        if(gid==='ito') Ito.init();
        else if(gid==='de') Decrypto.init();
        else KillerDance.init();
    },
    eject() {
        if(this.currentGame) db.ref(this.currentGame).off();
        this.currentGame = null;
        this.show('view-portal');
    },
    recordWin(gameId, winner) {
        const winners = Array.isArray(winner) ? winner : [winner];
        winners.forEach(playerName => {
            db.ref(`stats/${gameId}/${playerName}`).once('value', snap => {
                const data = snap.val() || { wins: 0, plays: 0 };
                db.ref(`stats/${gameId}/${playerName}`).update({
                    wins: (data.wins || 0) + 1,
                    plays: (data.plays || 0) + 1,
                    lastWin: new Date().toISOString()
                });
            });
        });
        // 全プレイヤーのプレイ数を増加
        db.ref(`stats/${gameId}`).once('value', snap => {
            const stats = snap.val() || {};
            Object.keys(stats).forEach(playerName => {
                db.ref(`stats/${gameId}/${playerName}`).once('value', s => {
                    const data = s.val() || { wins: 0, plays: 0 };
                    if(!winners.includes(playerName)) {
                        db.ref(`stats/${gameId}/${playerName}`).update({
                            plays: (data.plays || 0) + 1
                        });
                    }
                });
            });
        });
    }
};

            const count = testPlayers.length + 1;
            const playerName = `n0yu-${team}${count}`;
            db.ref('de/players').push({uid: 'n0yu', name: playerName, team: team});
        });
    },
    saveMemo() { const v = document.getElementById('de-memo').value; db.ref('de/memo').set(v); },
    startGame() { 
        const code = [1,2,3,4].sort(()=>0.5-Math.random()).slice(0,3).join('');
        db.ref('de').update({ started: true, code: code, blackChips: 0, whiteChips: 0, memo: "" }); 
    },
    sendH() { const h = [document.getElementById('h1').value, document.getElementById('h2').value, document.getElementById('h3').value].join(' / '); if(h.length > 5) db.ref('de/hints').set(h); },
    sendA(t) { const v = document.getElementById('ain').value; if(v.length===3) db.ref('de/ans'+t).set(v); },
    judge(r, d) {
        const bOk = (String(d.ansB)===String(d.code)), wOk = (String(d.ansW)===String(d.code));
        const up = {}; up[`de/logs/r${Date.now()}`] = { r: r, h: d.hints, c: d.code, wRes: wOk?"○":"×", bRes: bOk?"○":"×" };
        up[`de/hints`] = null; up[`de/ansW`] = null; up[`de/ansB`] = null;
        up[`de/code`] = [1,2,3,4].sort(()=>0.5-Math.random()).slice(0,3).join('');
        const newBChips = (d.blackChips || 0) + (bOk ? 1 : 0);
        const newWChips = (d.whiteChips || 0) + (wOk ? 0 : 1);
        up[`de/blackChips`] = newBChips;
        up[`de/whiteChips`] = newWChips;
        
        // ゲーム終了判定とスコア記録
        if(newBChips >= 2) {
            const players = d.players || {};
            const blackTeam = Object.values(players).filter(p => p.team === 'B').map(p => p.name);
            Core.recordWin('de', blackTeam);
        } else if(newWChips >= 2) {
            const players = d.players || {};
            const whiteTeam = Object.values(players).filter(p => p.team === 'W').map(p => p.name);
            Core.recordWin('de', whiteTeam);
        }
        
        db.ref().update(up).then(() => this.isJudging = false);
    },
    skipRound() {
        db.ref('de').once('value', snap => {
            const d = snap.val() || {};
            const round = (d.logs ? Object.keys(d.logs).length : 0) + 1;
            const up = {};
            up[`de/logs/r${Date.now()}`] = { r: round, h: "SKIP", c: "--", wRes: "--", bRes: "--" };
            up[`de/hints`] = null; up[`de/ansW`] = null; up[`de/ansB`] = null;
            up[`de/code`] = [1,2,3,4].sort(()=>0.5-Math.random()).slice(0,3).join('');
            db.ref().update(up).then(() => this.isJudging = false);
        });
    },
    reset() { if(confirm("RESET?")) db.ref('de').remove(); }
};

    renderActionArea(state, myId, myHand) {

            if(state.pending.type === "trade" && state.pending.targetId === myId) return `<button class="btn btn-orange" onclick="KillerDance.respondTrade()">交換するカードを選ぶ</button>`;

        // 有効なカードがあるかチェック

    join() {
        db.ref('kd/players').once('value', snap => {
            const players = snap.val() || {};
            const exists = Object.values(players).some(p => p.uid === Core.user);
            if(!exists) db.ref('kd/players').push({ uid: Core.user, name: Core.user });
        });

    addTestPlayer() {
        db.ref('kd/players').once('value', snap => {
            const players = snap.val() || {};
            const testPlayers = Object.values(players).filter(p => p.uid === 'n0yu');
            const count = testPlayers.length + 1;
            const playerName = `プレイヤー${String.fromCharCode(64 + count)}`; // A, B, C...
            db.ref('kd/players').push({ uid: 'n0yu', name: playerName });
        });
    },
    start() {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            const players = state.players || {};
            const ids = Object.keys(players);
            const isTestMode = Core.user === "n0yu";
            if(!isTestMode && (ids.length < 3 || ids.length > 8)) {
                alert("3人から8人で開始してください。");
                return;
            }
            const deck = this.buildDeck(ids.length);
            const shuffled = this.shuffle(deck.slice());
            const hands = {};
            ids.forEach(id => { hands[id] = []; });
            for(let i = 0; i < 4; i++) ids.forEach(id => hands[id].push(shuffled.pop()));
            const discovererId = ids.find(id => hands[id].includes("discoverer"));
            db.ref('kd').set({
                players,
                started: true,
                hands,
                turnOrder: ids,
                turnIndex: Math.max(0, ids.indexOf(discovererId)),
                turnsPlayed: 0,
                discovererPlayed: false,
                incident: "",
                pending: null,
                privateInfo: {},
                schemePlayers: {},
                winner: null,
                log: { [Date.now()]: `ゲーム開始: ${ids.map(id => players[id].name).join(", ")}` }
            });
        });
    },
    buildDeck(playerCount) {
        if(playerCount === 8) return this.allCards.slice();
        const rule = this.setupRules[playerCount];
        const required = rule.required.slice();
        const pool = this.allCards.slice();
        required.forEach(card => {
            const idx = pool.indexOf(card);
            if(idx >= 0) pool.splice(idx, 1);
        });
        return required.concat(this.shuffle(pool).slice(0, rule.others));
    },
    play(cardIndex) {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            if(!state.started || state.pending || state.winner) return;
            const players = state.players || {};
            const meEntry = Object.entries(players).find(([, p]) => p.uid === Core.user);
            if(!meEntry) return;
            const myId = meEntry[0];
            const order = state.turnOrder || [];
            const turnIndex = state.turnIndex || 0;
            if(order[turnIndex] !== myId) return;
            const hands = JSON.parse(JSON.stringify(state.hands || {}));
            const myHand = (hands[myId] || []).slice();
            const card = myHand[cardIndex];
            if(!card || !this.canPlayCard(state, myId, card, myHand)) return;
            hands[myId].splice(cardIndex, 1);
            const privateInfo = {};
            const schemePlayers = Object.assign({}, state.schemePlayers || {});
            let incident = state.incident || "";
            let discovererPlayed = state.discovererPlayed || false;
            let pending = null;
            let winner = null;
            let logText = `${Core.user} が ${this.cardDefs[card].label} を出した`;
            if(card === "discoverer") {
                incident = prompt("今回の事件名を入力してください", state.incident || "事件発生") || "事件発生";
                discovererPlayed = true;
                logText = `${Core.user} が第一発見者として事件を宣言した`;
            } else if(card === "scheme") {
                schemePlayers[myId] = true;
                logText = `${Core.user} がたくらみで犯人側についた`;
            } else if(card === "boy") {
                const holder = this.findCulpritHolder(hands, players);
                if(holder) privateInfo[myId] = `少年の情報: ${holder.name} が犯人カードを持っています。`;
                logText = `${Core.user} が少年で犯人カードの所在を確認した`;
            } else if(card === "witness") {
                const targetId = this.promptForTarget(players, order, myId, "手札を見る相手を選んでください");
                if(!targetId) return;
                const cards = (hands[targetId] || []).map(c => this.cardDefs[c].label).join(" / ");
                privateInfo[myId] = `目撃者の情報: ${players[targetId].name} の手札は [${cards || "なし"}] です。`;
                logText = `${Core.user} が目撃者で ${players[targetId].name} の手札を見た`;
            } else if(card === "dog") {
                const targetId = this.promptForTarget(players, order, myId, "いぬで調べる相手を選んでください");
                if(!targetId) return;
                const targetHand = hands[targetId] || [];
                if(targetHand.length) {
                    const idx = this.promptForCardPosition(targetHand.length, `${players[targetId].name} の何枚目を調べますか？`);
                    if(idx === null) return;
                    if(targetHand[idx] === "culprit") {
                        winner = this.makeWinner("いぬ勝利", [myId], players);
                        logText = `${Core.user} がいぬで犯人カードを引き当てた`;
                    } else {
                        privateInfo[myId] = `いぬの結果: ${players[targetId].name} の ${idx + 1} 枚目は犯人ではありません。`;
                        logText = `${Core.user} はいぬを使ったが外れた`;
                    }
                }
            } else if(card === "detective") {
                const targetId = this.promptForTarget(players, order, myId, "探偵で指名する相手を選んでください");
                if(!targetId) return;
                if((state.turnsPlayed || 0) < order.length) logText = `${Core.user} は1周目に探偵を出したため効果がなかった`;
                else if(this.isCulprit(hands[targetId] || [])) {
                    winner = this.makeWinner("探偵勝利", [myId], players);
                    logText = `${Core.user} が探偵で ${players[targetId].name} を当てた`;
                } else logText = `${Core.user} は探偵で ${players[targetId].name} を外した`;
            } else if(card === "culprit") {
                if(myHand.length !== 1) return;
                winner = this.makeWinner("犯人勝利", [myId].concat(Object.keys(schemePlayers)), players);
                logText = `${Core.user} が最後の1枚として犯人を出した`;
            } else if(card === "rumor") {
                const before = JSON.parse(JSON.stringify(hands));
                order.forEach(id => {
                    const rightId = order[(order.indexOf(id) - 1 + order.length) % order.length];
                    const from = before[rightId] || [];
                    if(!from.length) return;
                    const moved = from[Math.floor(Math.random() * from.length)];
                    const liveIndex = hands[rightId].indexOf(moved);
                    if(liveIndex >= 0) {
                        hands[rightId].splice(liveIndex, 1);
                        hands[id].push(moved);
                    }
                });
                logText = `${Core.user} がうわさを出した`;
            } else if(card === "trade") {
                if(hands[myId].length === 0) {
                    logText = `${Core.user} が取り引きを出したが、残り手札がないため効果はなかった`;
                } else {
                    const targetId = this.promptForTarget(players, order, myId, "取り引きする相手を選んでください");
                    if(!targetId) return;
                    if(hands[targetId].length) {
                        const ownIdx = this.promptForOwnCard(hands[myId], "交換に出す自分のカードを選んでください");
                        if(ownIdx === null) return;
                        pending = { type: "trade", initiatorId: myId, targetId, offeredCard: hands[myId].splice(ownIdx, 1)[0] };
                        logText = `${Core.user} が ${players[targetId].name} に取り引きを持ちかけた`;
                    } else {
                        logText = `${Core.user} が取り引きを出したが、相手の手札がなく効果はなかった`;
                    }
                }
            } else if(card === "infoControl") {
                if(hands[myId].length === 0) {
                    logText = `${Core.user} が情報操作を出したが、残り手札がないため効果はなかった`;
                } else {
                    pending = { type: "infoControl", choices: {} };
                    logText = `${Core.user} が情報操作を出した`;
                }
            }
            const payload = { hands, privateInfo, schemePlayers, incident, discovererPlayed, pending, turnsPlayed: (state.turnsPlayed || 0) + 1, winner };
            if(!pending && !winner) payload.turnIndex = this.nextTurn(order, turnIndex);
            db.ref('kd').update(payload).then(() => this.appendLog(logText));
        });
    },
    respondTrade() {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            if(!state.pending || state.pending.type !== "trade") return;
            const players = state.players || {};
            const meEntry = Object.entries(players).find(([, p]) => p.uid === Core.user);
            if(!meEntry) return;
            const myId = meEntry[0];
            if(state.pending.targetId !== myId) return;
            const hands = JSON.parse(JSON.stringify(state.hands || {}));
            const idx = this.promptForOwnCard(hands[myId] || [], "交換で返すカードを選んでください");
            if(idx === null) return;
            const returned = hands[myId].splice(idx, 1)[0];
            hands[myId].push(state.pending.offeredCard);
            hands[state.pending.initiatorId].push(returned);
            db.ref('kd').update({ hands, pending: null, turnIndex: this.nextTurn(state.turnOrder || [], state.turnIndex || 0) }).then(() => this.appendLog(`${players[myId].name} が取り引きを完了した`));
        });
    },
    respondInfoControl() {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            if(!state.pending || state.pending.type !== "infoControl") return;
            const players = state.players || {};
            const meEntry = Object.entries(players).find(([, p]) => p.uid === Core.user);
            if(!meEntry) return;
            const myId = meEntry[0];
            const hands = JSON.parse(JSON.stringify(state.hands || {}));
            const idx = this.promptForOwnCard(hands[myId] || [], "左隣に渡すカードを選んでください");
            if(idx === null) return;
            const choices = Object.assign({}, state.pending.choices || {}, { [myId]: idx });
            const requiredIds = (state.turnOrder || []).filter(id => (hands[id] || []).length > 0);
            if(!requiredIds.every(id => Object.prototype.hasOwnProperty.call(choices, id))) {
                db.ref('kd/pending/choices').set(choices);
                return;
            }
            const before = JSON.parse(JSON.stringify(hands));
            requiredIds.forEach(id => {
                const chosen = before[id][choices[id]];
                const leftId = state.turnOrder[(state.turnOrder.indexOf(id) + 1) % state.turnOrder.length];
                const removeIndex = hands[id].indexOf(chosen);
                if(removeIndex >= 0) {
                    hands[id].splice(removeIndex, 1);
                    hands[leftId].push(chosen);
                }
            });
            db.ref('kd').update({ hands, pending: null, turnIndex: this.nextTurn(state.turnOrder || [], state.turnIndex || 0) }).then(() => this.appendLog("情報操作が解決された"));
        });
    },
    respondTradeAuto(state, myId, myHand) {
        if(!state.pending || state.pending.type !== "trade" || state.pending.targetId !== myId) return;
        const hands = JSON.parse(JSON.stringify(state.hands || {}));
        if(!myHand.length) return;
        const ownIdx = Math.floor(Math.random() * myHand.length);
        const returned = hands[myId].splice(ownIdx, 1)[0];
        hands[myId].push(state.pending.offeredCard);
        hands[state.pending.initiatorId].push(returned);
        const players = state.players || {};
        db.ref('kd').update({ hands, pending: null, turnIndex: this.nextTurn(state.turnOrder || [], state.turnIndex || 0) }).then(() => this.appendLog(`${players[myId].name} が自動で取り引きを完了した`));
    },
    respondInfoControlAuto(state, myId, myHand) {
        if(!state.pending || state.pending.type !== "infoControl") return;
        if(!myHand.length) return;
        const idx = Math.floor(Math.random() * myHand.length);
        const choices = Object.assign({}, state.pending.choices || {}, { [myId]: idx });
        const hands = state.hands || {};
        const requiredIds = (state.turnOrder || []).filter(id => (hands[id] || []).length > 0);
        if(!requiredIds.every(id => Object.prototype.hasOwnProperty.call(choices, id))) {
            db.ref('kd/pending/choices').set(choices);
            return;
        }
        const handsCopy = JSON.parse(JSON.stringify(hands));
        const before = JSON.parse(JSON.stringify(hands));
        requiredIds.forEach(id => {
            const chosen = before[id][choices[id]];
            const leftId = state.turnOrder[(state.turnOrder.indexOf(id) + 1) % state.turnOrder.length];
            const removeIndex = handsCopy[id].indexOf(chosen);
            if(removeIndex >= 0) {
                handsCopy[id].splice(removeIndex, 1);
                handsCopy[leftId].push(chosen);
            }
        });
        db.ref('kd').update({ hands: handsCopy, pending: null, turnIndex: this.nextTurn(state.turnOrder || [], state.turnIndex || 0) }).then(() => this.appendLog("情報操作が自動で解決された"));
    },
    canPlayCard(state, myId, card, myHand) {
        if(state.pending || state.winner) return false;
        const order = state.turnOrder || [];
        if(order[state.turnIndex || 0] !== myId) return false;
        if(!state.discovererPlayed) return card === "discoverer";
        if(card === "culprit") return myHand.length === 1;
        return true;
    },
    isCulprit(hand) { return hand.includes("culprit") && !hand.includes("alibi"); },
    findCulpritHolder(hands, players) {
        const found = Object.entries(hands || {}).find(([, hand]) => (hand || []).includes("culprit"));
        return found ? { id: found[0], name: players[found[0]] ? players[found[0]].name : found[0] } : null;
    },
    makeWinner(kind, ids, players) {
        const uniqueIds = [...new Set(ids)];
        const names = uniqueIds.map(id => players[id] ? players[id].name : id);
        return { kind, ids: uniqueIds, names, message: `${kind}: ${names.join(", ")}` };
    },
    nextTurn(order, currentIndex) { return order.length ? (currentIndex + 1) % order.length : 0; },
    promptForTarget(players, order, myId, title) {
        const candidates = order.filter(id => id !== myId);
        if(!candidates.length) return null;
        if(Core.user === "n0yu") {
            // テストモード：ランダムに選択
            return candidates[Math.floor(Math.random() * candidates.length)];
        }
        const raw = prompt(`${title}\n` + candidates.map((id, idx) => `${idx + 1}: ${players[id].name}`).join("\n"), "1");
        if(raw === null) return null;
        const picked = Number(raw) - 1;
        return Number.isInteger(picked) && picked >= 0 && picked < candidates.length ? candidates[picked] : null;
    },
    promptForOwnCard(hand, title) {
        if(!hand.length) return null;
        if(Core.user === "n0yu") {
            // テストモード：ランダムに選択
            return Math.floor(Math.random() * hand.length);
        }
        const raw = prompt(`${title}\n` + hand.map((card, idx) => `${idx + 1}: ${this.cardDefs[card].label}`).join("\n"), "1");
        if(raw === null) return null;
        const picked = Number(raw) - 1;
        return Number.isInteger(picked) && picked >= 0 && picked < hand.length ? picked : null;
    },
    promptForCardPosition(count, title) {
        const raw = prompt(`${title}\n1-${count} の番号を入力してください`, "1");
        if(raw === null) return null;
        const picked = Number(raw) - 1;
        return Number.isInteger(picked) && picked >= 0 && picked < count ? picked : null;
    },
    appendLog(message) { db.ref(`kd/log/${Date.now()}`).set(message); },
    skipTurn() {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            if(!state.started || state.pending || state.winner) return;
            const players = state.players || {};
            const meEntry = Object.entries(players).find(([, p]) => p.uid === Core.user);
            if(!meEntry) return;
            const myId = meEntry[0];
            const order = state.turnOrder || [];
            const turnIndex = state.turnIndex || 0;
            if(order[turnIndex] !== myId) return;
            
            // スキップ可能かチェック（有効なカードがない場合のみ）
            const myHand = state.hands && state.hands[myId] ? state.hands[myId] : [];
            const validCards = myHand.map((card, idx) => 
                this.canPlayCard(state, myId, card, myHand) ? idx : -1
            ).filter(idx => idx !== -1);
            
            if(validCards.length > 0) return; // 有効なカードがある場合はスキップ不可
            
            const logText = `${Core.user} が手番をスキップした`;
            const payload = { turnsPlayed: (state.turnsPlayed || 0) + 1 };
            payload.turnIndex = this.nextTurn(order, turnIndex);
            db.ref('kd').update(payload).then(() => this.appendLog(logText));
        });
    },
    shuffle(arr) {
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    },
    reset() { if(confirm("RESET?")) db.ref('kd').remove(); }
};
</script>
