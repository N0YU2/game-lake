<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INIAD MULTI-CONSOLE V7.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #004098; --orange: #e67e22; --bg: #e0e0e0; --frame: #333; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #console-frame { background: var(--frame); width: 95%; max-width: 600px; min-height: 95vh; margin: 10px; border-radius: 20px; border-bottom: 8px solid #222; padding: 20px; box-sizing: border-box; color: white; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .screen { background: #fff; border-radius: 10px; color: #333; padding: 15px; min-height: 520px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); overflow-y: auto; }
        .hidden { display: none !important; }
        .btn { padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; width: 100%; margin: 8px 0; font-size: 1rem; transition: 0.1s; }
        .btn:active { transform: scale(0.97); }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-orange { background: var(--orange); color: #fff; }
        .btn-gray { background: #eee; color: #333; border: 1px solid #ccc; }
        .ito-card { width: 45px; height: 65px; border: 2px solid var(--blue); border-radius: 5px; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; margin: 2px; font-weight: bold; background: white; }
        .hand-area { width: 80px; height: 110px; background: var(--blue); color: white; margin: 10px auto; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; font-size: 0.8rem; }
        .num-view { position: absolute; width: 100%; height: 100%; background: #fff; border: 3px solid var(--blue); border-radius: 10px; color: var(--blue); font-size: 2.5rem; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
        .hand-area:active .num-view { opacity: 1; }
        .kw-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }
        .kw-box { border: 1px solid var(--blue); padding: 10px 2px; border-radius: 5px; font-size: 0.75rem; background: #f9f9f9; text-align: center; font-weight: bold; }
        .log-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; margin-top: 15px; }
        .log-table th, .log-table td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        .res-success { background: #e3f2fd; color: var(--blue); font-weight: bold; }
        .res-intercept { background: #fff3e0; color: var(--orange); font-weight: bold; }
        .reset-link { font-size: 0.7rem; color: #999; margin-top: 20px; cursor: pointer; text-decoration: underline; display: block; text-align: center; }
        .kd-card { border: 2px solid var(--blue); border-radius: 10px; padding: 10px; margin: 8px 0; background: #fff; color: #333; }
        .kd-card button { margin-top: 8px; }
        .kd-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .kd-pill { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: bold; background: #eef4ff; color: var(--blue); margin-right: 6px; }
        .kd-panel { border: 1px solid #d8d8d8; border-radius: 10px; padding: 10px; background: #fafafa; margin: 10px 0; }
        .kd-danger { color: #b42318; font-weight: bold; }
        .kd-log { font-size: 0.8rem; line-height: 1.5; background: #f7f7f7; border-radius: 8px; padding: 10px; min-height: 80px; }
    </style>
</head>
<body>

<div id="console-frame">
    <div style="text-align:center; margin-bottom:10px; font-weight:bold; font-size: 0.7rem;">INIAD GAME CONSOLE V7.0</div>
    <div class="screen">
        <div id="view-login">
            <h2 style="text-align:center; margin-top:60px;">SYSTEM BOOT</h2>
            <input type="text" id="in-name" class="btn btn-gray" placeholder="ユーザー名" style="box-sizing: border-box;">
            <button onclick="Core.login()" class="btn btn-blue">START</button>
        </div>
        <div id="view-portal" class="hidden">
            <p id="u-display" style="font-weight:bold; color:var(--blue); border-bottom:1px solid #ddd; padding-bottom:5px;">User: ---</p>
            <button onclick="Core.loadGame('ito')" class="btn btn-blue">🃏 Ito (100 Themes)</button>
            <button onclick="Core.loadGame('de')" class="btn btn-orange">🔒 Decrypto</button>
            <button onclick="Core.loadGame('kd')" class="btn btn-gray">Hannin wa Odoru</button>
        </div>
        <div id="view-game" class="hidden">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <button onclick="Core.eject()" style="border:none; background:none; cursor:pointer; color:#888;">◀ EJECT</button>
                <div id="game-tag" style="background:#eee; font-size:0.7rem; padding:2px 10px; border-radius:10px; font-weight:bold;"></div>
            </div>
            <div id="game-content"></div>
        </div>
    </div>
</div>

<script>
// --- CORE SYSTEM ---
const firebaseConfig = { databaseURL: "https://noyu-d5611-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const Core = {
    user: "", currentGame: null,
    login() {
        this.user = document.getElementById('in-name').value.trim();
        if(!this.user) return;
        document.getElementById('u-display').innerText = "User: " + this.user;
        this.show('view-portal');
    },
    show(id) {
        ['view-login', 'view-portal', 'view-game'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },
    loadGame(gid) {
        this.currentGame = gid;
        document.getElementById('game-tag').innerText = gid.toUpperCase();
        this.show('view-game');
        if(gid==='ito') Ito.init();
        else if(gid==='de') Decrypto.init();
        else KillerDance.init();
    },
    eject() {
        db.ref(this.currentGame).off();
        this.currentGame = null;
        this.show('view-portal');
    }
};

// --- ITO SYSTEM (100 Themes) ---

        {n:"カッコいい楽器", s:"1:ダサい ↔ 100:最高"}, {n:"最強のスープ", s:"1:不味い ↔ 100:最高"}, {n:"言われて嬉しい言葉", s:"1:無 ↔ 100:最高"}, {n:"将来の夢の大きさ", s:"1:小さい ↔ 100:巨大"}, {n:"好きな香水", s:"1:臭い ↔ 100:良い香り"}, {n:"一番面白いアニメ", s:"1:退屈 ↔ 100:爆笑"}, {n:"旅行先トラブル", s:"1:軽微 ↔ 100:絶望"}, {n:"最強のパン", s:"1:不味い ↔ 100:最高"}, {n:"放課後の過ごし方", s:"1:退屈 ↔ 100:最高"}, {n:"最強のトッピング", s:"1:不要 ↔ 100:必要"},

    init() {
        document.getElementById('game-content').innerHTML = `
            <div id="ito-setup"><h3>THEME SELECT</h3><button onclick="Ito.suggest()" class="btn btn-orange">お題を出す</button><div id="ito-opts"></div></div>

                        <button onclick="Ito.submit()" class="btn btn-orange">カードを出す</button>
                    </div>
                </div>
            </div>
            <span onclick="Ito.reset()" class="reset-link">HARD RESET</span>`;

            const d = snap.val() || {};
            if(d.config) {
                document.getElementById('ito-setup').classList.add('hidden'); document.getElementById('ito-play').classList.remove('hidden');
                document.getElementById('it-n').innerText = d.config.theme; document.getElementById('it-s').innerText = d.config.scale;
            } else {
                document.getElementById('ito-setup').classList.remove('hidden'); document.getElementById('ito-play').classList.add('hidden');
                document.getElementById('ito-opts').innerHTML = (d.proposals||[]).map((p,i)=>`<button class="btn btn-gray" onclick="Ito.select(${i})">${p.n}</button>`).join('');
                this.drawCount = 0; // リセット
            }
            // 通知の表示
            const noticeEl = document.getElementById('it-notice');
            if(d.lastRedraw && d.lastRedraw.user !== "none") {
                noticeEl.innerText = `⚠️ ${d.lastRedraw.user}が${d.lastRedraw.count}回目の引き直し！`;
            } else {
                noticeEl.innerText = "";
            }
            const f = document.getElementById('it-field'); f.innerHTML = "";
            if(d.cards) {
                let last=0, fail=false;
                Object.values(d.cards).sort((a,b)=>a.ts-b.ts).forEach(c => {
                    if(c.num < last) fail = true;
                    f.innerHTML += `<div class="ito-card" style="border-color:${fail?'red':'#004098'}"><span>${c.num}</span><small style="font-size:0.5rem;">${c.user}</small></div>`;
                    last = c.num;
                });
                document.getElementById('it-msg').innerText = fail ? "FAILED" : "STABLE";
            }
        });
    },
    suggest() { db.ref('ito/proposals').set(this.themes.sort(()=>0.5-Math.random()).slice(0,3)); },
    select(i) { db.ref('ito/proposals').once('value', s=>{ const p=s.val(); if(p) db.ref('ito/config').set({theme:p[i].n, scale:p[i].s}); }); },
    draw() { 
        this.myNum = Math.floor(Math.random()*100)+1; 
        this.drawCount++;
        document.getElementById('it-mynum').innerText = this.myNum; 
        document.getElementById('it-draw').classList.add('hidden'); 
        document.getElementById('it-actions').classList.remove('hidden'); 
        // 全員に通知
        if(this.drawCount > 1) {
            db.ref('ito/lastRedraw').set({user: Core.user, count: this.drawCount});
        }
    },
    submit() { 
        db.ref('ito/cards').push({num:this.myNum, user:Core.user, ts:Date.now()}); 
        db.ref('ito/lastRedraw').set({user: "none", count: 0}); // 通知を消す
        document.getElementById('it-actions').classList.add('hidden'); 
    },
    reset() { if(confirm("RESET?")) db.ref('ito').remove(); }
};

                    <div id="black-memo-area" class="hidden" style="margin-top:10px;"><input id="de-memo" oninput="Decrypto.saveMemo()" placeholder="黒チーム共有メモ..." style="width:100%; font-size:0.7rem; padding:5px; border:1px solid var(--orange); border-radius:5px; background:#fff8f4;"></div>
                    <div id="de-ctrl" style="padding:15px; background:#f4f4f4; border-radius:10px; margin-top:10px; border:1px solid #ddd;"></div>
                    <table class="log-table" style="font-size:0.65rem; margin-top:10px;"><thead><tr><th>R</th><th>ヒント</th><th>正解</th><th>白/黒</th></tr></thead><tbody id="de-log"></tbody></table>
                </div>
                <span onclick="Decrypto.reset()" class="reset-link">HARD RESET</span>
            </div>`;
        this.listen();
    },
    listen() {
        db.ref('de').on('value', snap => {
            const d = snap.val() || {};
            if(!d.words) { db.ref('de/words').set(this.wordsList.sort(()=>0.5-Math.random()).slice(0,4)); return; }
            const players = d.players || {}, members = Object.entries(players);
            const whiteTeam = members.filter(p => p[1].team === 'W').map(p => p[1].name);
            const blackTeam = members.filter(p => p[1].team === 'B').map(p => p[1].name);
            const bChips = d.blackChips || 0, wChips = d.whiteChips || 0;
            document.getElementById('chip-b').innerText = bChips; document.getElementById('chip-w').innerText = wChips;
            if(bChips >= 2) { alert("黒チーム勝利！(傍受2)"); this.reset(); return; }
            if(wChips >= 2) { alert("白チーム敗北！(ミス2)"); this.reset(); return; }

            if(!d.started) {
                document.getElementById('de-setup').classList.remove('hidden'); document.getElementById('de-board').classList.add('hidden');
                document.getElementById('list-w').innerText = whiteTeam.join(', '); document.getElementById('list-b').innerText = blackTeam.join(', ');
                const canStart = whiteTeam.length >= 2 && blackTeam.length >= 1;
                const sBtn = document.getElementById('de-start-btn'); sBtn.disabled = !canStart; sBtn.className = canStart ? "btn btn-orange" : "btn btn-gray";
                if(!members.find(p => p[1].uid === Core.user)) db.ref('de/players').push({uid: Core.user, name: Core.user, team: 'W'});
                return;
            }

            document.getElementById('de-setup').classList.add('hidden'); document.getElementById('de-board').classList.remove('hidden');
            const me = members.find(p => p[1].uid === Core.user); this.role = me ? me[1].team : "";
            const round = (d.logs ? Object.keys(d.logs).length : 0) + 1;
            document.getElementById('de-r-view').innerText = `Round ${round}`;
            
            // 単語と履歴の更新
            const hists = {1:[], 2:[], 3:[], 4:[]};
            if(d.logs) Object.values(d.logs).forEach(l => {
                const hs = l.h.split(' / '), cs = String(l.c).split('');
                cs.forEach((num, idx) => { if(hists[num]) hists[num].push(hs[idx]); });
            });
            [1,2,3,4].forEach(i => {
                document.getElementById('dw'+i).innerText = (this.role==='W' ? i+': '+d.words[i-1] : '?');
                document.getElementById('h-kw'+i).innerText = (this.role==='W' ? d.words[i-1] : '?');
                document.getElementById('hl'+i).innerText = hists[i].join(', ');
            });

            // 黒チーム専用メモの同期
            const memoArea = document.getElementById('black-memo-area');
            if(this.role==='B') { memoArea.classList.remove('hidden'); document.getElementById('de-memo').value = d.memo || ""; }
            else { memoArea.classList.add('hidden'); }

            const maker = whiteTeam[(round - 1) % whiteTeam.length];
            const infoEl = document.getElementById('de-info');
            infoEl.innerText = `チーム: ${this.role==='W'?'白':'黒'} / 親: ${maker}`;
            infoEl.style.background = (this.role==='W' ? '#eef6ff' : '#fff4ee');

            const ctrl = document.getElementById('de-ctrl');
            if(!d.hints) {
                if(this.role==='W' && Core.user === maker) {
                    if(!d.code) db.ref('de/code').set([1,2,3,4].sort(()=>0.5-Math.random()).slice(0,3).join(''));
                    ctrl.innerHTML = `暗号: <b style="font-size:1.8rem; color:red;">${d.code||'..'}</b><div style="display:flex; gap:5px; margin-top:10px;"><input id="h1" class="btn btn-gray" placeholder="H1" style="width:33%"><input id="h2" class="btn btn-gray" placeholder="H2" style="width:33%"><input id="h3" class="btn btn-gray" placeholder="H3" style="width:33%"></div><button onclick="Decrypto.sendH()" class="btn btn-orange" style="width:100%; margin-top:10px;">ヒント送信</button>`;
                } else { ctrl.innerHTML = `<center>白の親「${maker}」が考え中...</center>`; }
            } else {
                if(this.role==='W' && Core.user!==maker && !d.ansW) {
                    ctrl.innerHTML = `ヒント: <b>${d.hints}</b><input id="ain" type="number" class="btn btn-gray" placeholder="3桁回答" style="width:100%; margin:10px 0;"><button onclick="Decrypto.sendA('W')" class="btn btn-blue" style="width:100%;">連携回答</button>`;
                } else if(this.role==='B' && !d.ansB) {
                    ctrl.innerHTML = `ヒント: <b>${d.hints}</b><input id="ain" type="number" class="btn btn-gray" placeholder="3桁傍受" style="width:100%; margin:10px 0;"><button onclick="Decrypto.sendA('B')" class="btn btn-orange" style="width:100%;">傍受攻撃</button>`;
                } else { ctrl.innerHTML = `<center>ヒント: ${d.hints}<br><small>回答待機中...</small></center>`; }
                if(Core.user===maker && d.ansW && d.ansB && !this.isJudging) { this.isJudging = true; this.judge(round, d); }
            }
            const lb = document.getElementById('de-log'); lb.innerHTML = "";
            if(d.logs) Object.values(d.logs).reverse().forEach(l => {
                lb.innerHTML += `<tr><td>${l.r}</td><td>${l.h}</td><td>${l.c}</td><td>白:${l.wRes} / 黒:${l.bRes}</td></tr>`;
            });
        });
    },
    saveMemo() { const v = document.getElementById('de-memo').value; db.ref('de/memo').set(v); },
    startGame() { 
        const code = [1,2,3,4].sort(()=>0.5-Math.random()).slice(0,3).join('');
        db.ref('de').update({ started: true, code: code, blackChips: 0, whiteChips: 0, memo: "" }); 
    },
    sendH() { const h = [document.getElementById('h1').value, document.getElementById('h2').value, document.getElementById('h3').value].join(' / '); if(h.length > 5) db.ref('de/hints').set(h); },
    sendA(t) { const v = document.getElementById('ain').value; if(v.length===3) db.ref('de/ans'+t).set(v); },
    judge(r, d) {
        const bOk = (String(d.ansB)===String(d.code)), wOk = (String(d.ansW)===String(d.code));
        const up = {}; up[`de/logs/r${Date.now()}`] = { r: r, h: d.hints, c: d.code, wRes: wOk?"○":"×", bRes: bOk?"○":"×" };
        up[`de/hints`] = null; up[`de/ansW`] = null; up[`de/ansB`] = null;
        up[`de/code`] = [1,2,3,4].sort(()=>0.5-Math.random()).slice(0,3).join('');
        up[`de/blackChips`] = (d.blackChips || 0) + (bOk ? 1 : 0);
        up[`de/whiteChips`] = (d.whiteChips || 0) + (wOk ? 0 : 1);
        db.ref().update(up).then(() => this.isJudging = false);
    },
    reset() { if(confirm("RESET?")) db.ref('de').remove(); }
};
// --- HANNIN WA ODORU ---
const KillerDance = {

        "alibi", "alibi", "alibi", "alibi", "alibi",

    ],
    setupRules: {
        3: { required: ["discoverer", "culprit", "detective", "alibi"], others: 8 },
        4: { required: ["discoverer", "culprit", "detective", "alibi", "scheme"], others: 11 },
        5: { required: ["discoverer", "culprit", "detective", "alibi", "alibi", "scheme"], others: 14 },
        6: { required: ["discoverer", "culprit", "detective", "detective", "alibi", "alibi", "scheme", "scheme"], others: 16 },
        7: { required: ["discoverer", "culprit", "detective", "detective", "alibi", "alibi", "alibi", "scheme", "scheme"], others: 19 },
        8: { required: null, others: 32 }
    },
    init() {
        document.getElementById('game-content').innerHTML = `
            <div id="kd-wrap">
                <div id="kd-lobby" class="kd-panel">
                    <h3 style="margin-top:0;">Hannin wa Odoru</h3>
                    <p style="font-size:0.85rem; margin-top:0;">Rule-based implementation for 3-8 players.</p>
                    <div id="kd-players" style="margin-bottom:10px;"></div>

                        <button onclick="KillerDance.start()" class="btn btn-orange" style="flex:1;">Start</button>

                </div>
                <div id="kd-board" class="hidden">

    listen() {
        db.ref('kd').on('value', snap => {
            const state = snap.val() || {};
            const players = state.players || {};
            const entries = Object.entries(players);
            const meEntry = entries.find(([, p]) => p.uid === Core.user);
            const myId = meEntry ? meEntry[0] : null;
            document.getElementById('kd-players').innerHTML = entries.length
                ? entries.map(([, p], idx) => `<span class="kd-pill">${idx + 1}. ${p.name}${p.uid===Core.user ? " (you)" : ""}</span>`).join("")
                : '<span style="color:#666;">No players yet.</span>';

            document.getElementById('kd-board').classList.remove('hidden');
            const order = state.turnOrder || [];

            const currentId = order[turnIndex] || "";
            const currentPlayer = players[currentId];
            const myHand = myId && state.hands && state.hands[myId] ? state.hands[myId] : [];
            const isMyTurn = myId && myId === currentId && !state.pending && !state.winner;
            document.getElementById('kd-status').innerHTML = state.winner
                ? `<span class="kd-danger">${state.winner.message}</span>`
                : `Current turn: ${currentPlayer ? currentPlayer.name : "-"}`;

                ? "Game over"
                : `${isMyTurn ? "Your turn." : "Waiting for another player."} Turn count: ${state.turnsPlayed || 0}`;
            document.getElementById('kd-incident').innerText = state.incident ? `Incident: ${state.incident}` : "Incident not announced yet.";
            document.getElementById('kd-player-list').innerHTML = order.map((id, idx) => {
                const player = players[id];
                const count = state.hands && state.hands[id] ? state.hands[id].length : 0;
                return `<div class="kd-card" style="margin:6px 0; padding:8px;">
                    <div style="font-weight:bold;">${idx + 1}. ${player ? player.name : id}</div>
                    <div style="font-size:0.8rem; color:#555;">Cards: ${count}${id === currentId && !state.winner ? " / active" : ""}</div>
                </div>`;
            }).join("");
            const privateInfo = myId && state.privateInfo ? state.privateInfo[myId] : "";
            const secretBits = [];
            if(this.isCulprit(myHand)) secretBits.push("You are currently the culprit.");
            else if(myHand.includes("culprit")) secretBits.push("You hold the Culprit card, but Alibi keeps you from counting as the culprit.");
            if(myHand.includes("scheme")) secretBits.push("You can still join the culprit side if Scheme is played.");
            if(privateInfo) secretBits.push(privateInfo);
            document.getElementById('kd-secret').innerText = secretBits.join(" ") || "No private info yet.";
            document.getElementById('kd-action').innerHTML = this.renderActionArea(state, myId, myHand);
            document.getElementById('kd-hand').innerHTML = myHand.length
                ? myHand.map((card, idx) => {
                    const meta = this.cardDefs[card];
                    const disabled = (!isMyTurn || state.winner || !this.canPlayCard(state, myId, card, myHand)) ? "disabled" : "";
                    return `<div class="kd-card"><div style="font-weight:bold;">${meta.label}</div><div style="font-size:0.82rem; color:#555;">${meta.desc}</div><button class="btn btn-blue" ${disabled} onclick="KillerDance.play(${idx})">Play</button></div>`;
                }).join("")
                : '<div style="color:#666;">No cards in hand.</div>';
            const logs = Object.values(state.log || {}).slice(-10).reverse();
            document.getElementById('kd-log').innerHTML = logs.length
                ? logs.map(item => `<div>${item}</div>`).join("")
                : '<div style="color:#666;">No logs yet.</div>';
        });
    },
    renderActionArea(state, myId, myHand) {
        if(state.winner) return "Winner already decided.";
        if(!myId) return "Join the room first.";
        if(state.pending) {
            if(state.pending.type === "trade" && state.pending.targetId === myId) return `<button class="btn btn-orange" onclick="KillerDance.respondTrade()">Choose trade card</button>`;
            if(state.pending.type === "infoControl") {
                const done = state.pending.choices && Object.prototype.hasOwnProperty.call(state.pending.choices, myId);
                if(!done && myHand.length) return `<button class="btn btn-orange" onclick="KillerDance.respondInfoControl()">Choose left-pass card</button>`;
                return done ? "You already answered. Waiting for others." : "Resolving info control.";
            }
            return "Resolving effect.";
        }
        const order = state.turnOrder || [];
        const currentId = order[state.turnIndex || 0];
        if(currentId !== myId) return "Another player is acting.";
        if(!state.discovererPlayed) return myHand.includes("discoverer") ? "Play First Finder and announce the incident." : "Waiting for First Finder.";
        return "Play 1 card. Detective only works from round 2 onward.";
    },
    join() {
        db.ref('kd/players').once('value', snap => {
            const players = snap.val() || {};
            const exists = Object.values(players).some(p => p.uid === Core.user);
            if(!exists) db.ref('kd/players').push({ uid: Core.user, name: Core.user });
        });
    },
    start() {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            const players = state.players || {};
            const ids = Object.keys(players);
            if(ids.length < 3 || ids.length > 8) {
                alert("Need 3 to 8 players.");
                return;
            }
            const deck = this.buildDeck(ids.length);
            const shuffled = this.shuffle(deck.slice());
            const hands = {};
            ids.forEach(id => { hands[id] = []; });
            for(let i = 0; i < 4; i++) ids.forEach(id => hands[id].push(shuffled.pop()));
            const discovererId = ids.find(id => hands[id].includes("discoverer"));
            db.ref('kd').set({
                players,
                started: true,
                hands,
                turnOrder: ids,
                turnIndex: Math.max(0, ids.indexOf(discovererId)),
                turnsPlayed: 0,
                discovererPlayed: false,
                incident: "",
                pending: null,
                privateInfo: {},
                schemePlayers: {},
                winner: null,
                log: { [Date.now()]: `Game start: ${ids.map(id => players[id].name).join(", ")}` }
            });
        });
    },
    buildDeck(playerCount) {
        if(playerCount === 8) return this.allCards.slice();
        const rule = this.setupRules[playerCount];
        const required = rule.required.slice();
        const pool = this.allCards.slice();
        required.forEach(card => {
            const idx = pool.indexOf(card);
            if(idx >= 0) pool.splice(idx, 1);
        });
        return required.concat(this.shuffle(pool).slice(0, rule.others));
    },
    play(cardIndex) {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            if(!state.started || state.pending || state.winner) return;
            const players = state.players || {};
            const meEntry = Object.entries(players).find(([, p]) => p.uid === Core.user);
            if(!meEntry) return;
            const myId = meEntry[0];
            const order = state.turnOrder || [];
            const turnIndex = state.turnIndex || 0;
            if(order[turnIndex] !== myId) return;
            const hands = JSON.parse(JSON.stringify(state.hands || {}));
            const myHand = (hands[myId] || []).slice();
            const card = myHand[cardIndex];
            if(!card || !this.canPlayCard(state, myId, card, myHand)) return;
            hands[myId].splice(cardIndex, 1);
            const privateInfo = {};
            const schemePlayers = Object.assign({}, state.schemePlayers || {});
            let incident = state.incident || "";
            let discovererPlayed = state.discovererPlayed || false;
            let pending = null;
            let winner = null;
            let logText = `${Core.user} played ${this.cardDefs[card].label}`;
            if(card === "discoverer") {
                incident = prompt("Enter the incident", state.incident || "Incident") || "Incident";
                discovererPlayed = true;
                logText = `${Core.user} started the case`;
            } else if(card === "scheme") {
                schemePlayers[myId] = true;
                logText = `${Core.user} joined the culprit side`;
            } else if(card === "boy") {
                const holder = this.findCulpritHolder(hands, players);
                if(holder) privateInfo[myId] = `Boy info: ${holder.name} has the Culprit card.`;
                logText = `${Core.user} checked the culprit holder`;
            } else if(card === "witness") {
                const targetId = this.promptForTarget(players, order, myId, "Choose a player to inspect");
                if(!targetId) return;
                const cards = (hands[targetId] || []).map(c => this.cardDefs[c].label).join(" / ");
                privateInfo[myId] = `Witness info: ${players[targetId].name} has [${cards || "none"}].`;
                logText = `${Core.user} inspected ${players[targetId].name}`;
            } else if(card === "dog") {
                const targetId = this.promptForTarget(players, order, myId, "Choose a player for Dog");
                if(!targetId) return;
                const targetHand = hands[targetId] || [];
                if(targetHand.length) {
                    const idx = this.promptForCardPosition(targetHand.length, `Pick a card position from ${players[targetId].name}`);
                    if(idx === null) return;
                    if(targetHand[idx] === "culprit") {
                        winner = this.makeWinner("Dog win", [myId], players);
                        logText = `${Core.user} hit the Culprit card with Dog`;
                    } else {
                        privateInfo[myId] = `Dog result: ${players[targetId].name}'s card ${idx + 1} was not Culprit.`;
                        logText = `${Core.user} missed with Dog`;
                    }
                }
            } else if(card === "detective") {
                const targetId = this.promptForTarget(players, order, myId, "Choose a player for Detective");
                if(!targetId) return;
                if((state.turnsPlayed || 0) < order.length) logText = `${Core.user} played Detective in round 1, so it had no effect`;
                else if(this.isCulprit(hands[targetId] || [])) {
                    winner = this.makeWinner("Detective win", [myId], players);
                    logText = `${Core.user} caught ${players[targetId].name}`;
                } else logText = `${Core.user} missed with Detective`;
            } else if(card === "culprit") {
                if(myHand.length !== 1) return;
                winner = this.makeWinner("Culprit win", [myId].concat(Object.keys(schemePlayers)), players);
                logText = `${Core.user} played Culprit as the last card`;
            } else if(card === "rumor") {
                const before = JSON.parse(JSON.stringify(hands));
                order.forEach(id => {
                    const rightId = order[(order.indexOf(id) - 1 + order.length) % order.length];
                    const from = before[rightId] || [];
                    if(!from.length) return;
                    const moved = from[Math.floor(Math.random() * from.length)];
                    const liveIndex = hands[rightId].indexOf(moved);
                    if(liveIndex >= 0) {
                        hands[rightId].splice(liveIndex, 1);
                        hands[id].push(moved);
                    }
                });
                logText = `${Core.user} triggered Rumor`;
            } else if(card === "trade") {
                const targetId = this.promptForTarget(players, order, myId, "Choose a player to trade with");
                if(!targetId) return;
                if(hands[myId].length && hands[targetId].length) {
                    const ownIdx = this.promptForOwnCard(hands[myId], "Choose your trade card");
                    if(ownIdx === null) return;
                    pending = { type: "trade", initiatorId: myId, targetId, offeredCard: hands[myId].splice(ownIdx, 1)[0] };
                    logText = `${Core.user} proposed a trade to ${players[targetId].name}`;
                }
            } else if(card === "infoControl") {
                pending = { type: "infoControl", choices: {} };
                logText = `${Core.user} triggered Info Control`;
            }
            const payload = { hands, privateInfo, schemePlayers, incident, discovererPlayed, pending, turnsPlayed: (state.turnsPlayed || 0) + 1, winner };
            if(!pending && !winner) payload.turnIndex = this.nextTurn(order, turnIndex);
            db.ref('kd').update(payload).then(() => this.appendLog(logText));
        });
    },
    respondTrade() {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            if(!state.pending || state.pending.type !== "trade") return;
            const players = state.players || {};
            const meEntry = Object.entries(players).find(([, p]) => p.uid === Core.user);
            if(!meEntry) return;
            const myId = meEntry[0];
            if(state.pending.targetId !== myId) return;
            const hands = JSON.parse(JSON.stringify(state.hands || {}));
            const idx = this.promptForOwnCard(hands[myId] || [], "Choose the card to return");
            if(idx === null) return;
            const returned = hands[myId].splice(idx, 1)[0];
            hands[myId].push(state.pending.offeredCard);
            hands[state.pending.initiatorId].push(returned);
            db.ref('kd').update({ hands, pending: null, turnIndex: this.nextTurn(state.turnOrder || [], state.turnIndex || 0) }).then(() => this.appendLog(`${players[myId].name} completed the trade`));
        });
    },
    respondInfoControl() {
        db.ref('kd').once('value', snap => {
            const state = snap.val() || {};
            if(!state.pending || state.pending.type !== "infoControl") return;
            const players = state.players || {};
            const meEntry = Object.entries(players).find(([, p]) => p.uid === Core.user);
            if(!meEntry) return;
            const myId = meEntry[0];
            const hands = JSON.parse(JSON.stringify(state.hands || {}));
            const idx = this.promptForOwnCard(hands[myId] || [], "Choose the card to pass left");
            if(idx === null) return;
            const choices = Object.assign({}, state.pending.choices || {}, { [myId]: idx });
            const requiredIds = (state.turnOrder || []).filter(id => (hands[id] || []).length > 0);
            if(!requiredIds.every(id => Object.prototype.hasOwnProperty.call(choices, id))) {
                db.ref('kd/pending/choices').set(choices);
                return;
            }
            const before = JSON.parse(JSON.stringify(hands));
            requiredIds.forEach(id => {
                const chosen = before[id][choices[id]];
                const leftId = state.turnOrder[(state.turnOrder.indexOf(id) + 1) % state.turnOrder.length];
                const removeIndex = hands[id].indexOf(chosen);
                if(removeIndex >= 0) {
                    hands[id].splice(removeIndex, 1);
                    hands[leftId].push(chosen);
                }
            });
            db.ref('kd').update({ hands, pending: null, turnIndex: this.nextTurn(state.turnOrder || [], state.turnIndex || 0) }).then(() => this.appendLog("Info Control resolved"));
        });
    },
    canPlayCard(state, myId, card, myHand) {
        if(state.pending || state.winner) return false;
        const order = state.turnOrder || [];
        if(order[state.turnIndex || 0] !== myId) return false;
        if(!state.discovererPlayed) return card === "discoverer";
        if(card === "culprit") return myHand.length === 1;
        return true;
    },
    isCulprit(hand) { return hand.includes("culprit") && !hand.includes("alibi"); },
    findCulpritHolder(hands, players) {
        const found = Object.entries(hands || {}).find(([, hand]) => (hand || []).includes("culprit"));
        return found ? { id: found[0], name: players[found[0]] ? players[found[0]].name : found[0] } : null;
    },
    makeWinner(kind, ids, players) {
        const uniqueIds = [...new Set(ids)];
        const names = uniqueIds.map(id => players[id] ? players[id].name : id);
        return { kind, ids: uniqueIds, names, message: `${kind}: ${names.join(", ")}` };
    },
    nextTurn(order, currentIndex) { return order.length ? (currentIndex + 1) % order.length : 0; },
    promptForTarget(players, order, myId, title) {
        const candidates = order.filter(id => id !== myId);
        if(!candidates.length) return null;
        const raw = prompt(`${title}\n` + candidates.map((id, idx) => `${idx + 1}: ${players[id].name}`).join("\n"), "1");
        if(raw === null) return null;
        const picked = Number(raw) - 1;
        return Number.isInteger(picked) && picked >= 0 && picked < candidates.length ? candidates[picked] : null;
    },
    promptForOwnCard(hand, title) {
        if(!hand.length) return null;
        const raw = prompt(`${title}\n` + hand.map((card, idx) => `${idx + 1}: ${this.cardDefs[card].label}`).join("\n"), "1");
        if(raw === null) return null;
        const picked = Number(raw) - 1;
        return Number.isInteger(picked) && picked >= 0 && picked < hand.length ? picked : null;
    },
    promptForCardPosition(count, title) {
        const raw = prompt(`${title}\nPick 1-${count}`, "1");
        if(raw === null) return null;
        const picked = Number(raw) - 1;
        return Number.isInteger(picked) && picked >= 0 && picked < count ? picked : null;
    },
    appendLog(message) { db.ref(`kd/log/${Date.now()}`).set(message); },
    shuffle(arr) {
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    },
    reset() { if(confirm("RESET?")) db.ref('kd').remove(); }
};
</script>
